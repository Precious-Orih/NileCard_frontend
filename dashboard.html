<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/styles/style.css">
    <link rel="icon" href="./assets/images/nileLogo.png">
    <script src="https://kit.fontawesome.com/88406e148e.js" crossorigin="anonymous"></script>
    <title>Dashboard</title>
</head>
<body>
    <div class="dashboard">
        <nav>
            <img src="./assets/images/nileLogo.png" class="nile-logo" alt="nile logo" height="40px">
            <a href="#"><i class="fa-solid fa-bars"></i></a>
            <div class="right">
                <a href="#"><i class="fa-solid fa-bars"></i></a>
                <a href="#"><i class="fa-solid fa-bars"></i></a>
                <a href="#"><i class="fa-solid fa-bars"></i></a>
                <img src="./assets/images/profile.png" class="small-profile" alt="profile">
            </div>
        </nav>

        <div class="main-dashboard">
            <div class="menu-bar">
                <ul>
                    <li><i class="fa-solid fa-school"></i></li>
                    <li><i class="fa-solid fa-school"></i></li>
                    <li><i class="fa-solid fa-school"></i></li>
                    <li><i class="fa-solid fa-school"></i></li>
                    <li><i class="fa-solid fa-school"></i></li>
                    <li><i class="fa-solid fa-school"></i></li>
                    <li><i class="fa-solid fa-school"></i></li>
                    <li><i class="fa-solid fa-school"></i></li>
                </ul>
            </div>
            <div class="profile">
                <img src="assets/images/profile.png" alt="profile">
                <h3>Name</h3>
                <h4>Status</h4>
                <hr>
                <h5>Information</h5>
            </div>
            <div class="building-div">
                <a href="#"><img class="building" src="./assets/images/school.png" alt="Block A"></a>
                <a href="#"><img class="building" src="./assets/images/school.png" alt="Block B"></a>
                <a href="#"><img class="building" src="./assets/images/school.png" alt="Block C"></a>
                <a href="#"><img class="building" src="./assets/images/school.png" alt="Block D"></a>
                <a href="#"><img class="building" src="./assets/images/school.png" alt="Block E"></a>
                <a href="#"><img class="building" src="./assets/images/school.png" alt="Block F"></a>
            </div>
        </div>
    </div>
</body>
</html>
