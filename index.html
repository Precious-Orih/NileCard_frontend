<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Card System</title>
    <link rel="icon" href="./assets/images/small university logo.png">
    <link rel="stylesheet" href="./src/styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Gilda+Display&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
        rel="stylesheet">
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"></link> </head>
<body>
    <div class="centre">
        <div id="main-index">
            <div id="logo-container">
                <img src="./assets/images/big logo.png" alt="Logo" height="70" width="340">
            </div>
                <h2>LOGIN</h2>
                <p>Card Administrator System</p>
                <form id="loginForm" action="submit">
                    <input type="text" id="idNumber" name="idNumber" placeholder="Enter your ID."><br>
                    <input type="password" id="password" name="password" placeholder="Enter your password."> <br>
                    <button type="submit" form="loginForm" value="submit">LOGIN</button><br>
                    <a href="#">Forget password?</a>
                </form>
                <hr>
                <footer>Vanguard University © 2026</footer>
        </div>
    </div>
</body>
</html>
